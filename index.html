<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لوحة تحكم السيرفر العالمي</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>لوحة تحكم السيرفر العالمي</h1>
        <div id="status-bar">الحالة: <span id="status">جاري الفحص...</span></div>
        
        <div class="input-grid">
            <div class="editor-box">
                <label>سكريبت HTML</label>
                <textarea id="html-code" placeholder="<html>...</html>"></textarea>
            </div>
            <div class="editor-box">
                <label>سكريبت CSS</label>
                <textarea id="css-code" placeholder="body { ... }"></textarea>
            </div>
            <div class="editor-box">
                <label>سكريبت JS</label>
                <textarea id="js-code" placeholder="function() { ... }"></textarea>
            </div>
        </div>

        <button id="upload-btn">رفع المشروع وتوليد الرابط</button>

        <div id="link-container" class="link-card hidden">
            <p>🚀 موقعك الآن حي على الإنترنت:</p>
            <div class="url-wrapper">
                <input type="text" id="final-url" readonly style="width:70%; padding:10px;">
                <button onclick="document.getElementById('final-url').select(); document.execCommand('copy'); alert('تم النسخ');">نسخ</button>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
